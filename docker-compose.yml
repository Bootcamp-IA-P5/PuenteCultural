services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        INSTALL_INGEST: "false"
    container_name: puentecultural-backend
    env_file:
      - ./backend/.env
    ports:
      - "8000:8080"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=5)" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
    container_name: puentecultural-frontend
    ports:
      - "5180:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
